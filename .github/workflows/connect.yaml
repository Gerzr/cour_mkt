name: Kobo Mail Automation

permissions:
  contents: write


on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: r-lib/actions/setup-r@v2

      - name: Install Java
        run: sudo apt-get update && sudo apt-get install -y default-jdk

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::httr
            any::jsonlite
            any::mailR
            any::stringr
            any::robotoolbox
            any::rJava
            any::janitor
      - name: Run script
        env:
          KOBO_API_TOKEN: ${{ secrets.KOBO_API_TOKEN }}
          KOBO_FORM_ID: ${{ secrets.KOBO_FORM_ID }}
          MAIL_USERNAME_GHA: ${{ secrets.MAIL_USERNAME_GHA }}
          MAIL_PASSWORD_GHA: ${{ secrets.MAIL_PASSWORD_GHA }}
        run: Rscript import.R

      - name: Commit sent IDs
        run: |
           git config --local user.email "koglogerard@gmail.com"
           git config --local user.name "koglo gerard"
           git add sent_submissions.json
           git commit -m "Update sent submissions" || echo "No changes to commit"
           git pull --rebase origin main
           git push origin HEAD:main